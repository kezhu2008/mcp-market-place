name: pr

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://placeholder.example
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: placeholder
          NEXT_PUBLIC_COGNITO_CLIENT_ID: placeholder
          NEXT_PUBLIC_COGNITO_DOMAIN: placeholder.auth.ap-southeast-2.amazoncognito.com
          NEXT_PUBLIC_COGNITO_REDIRECT_URI: https://placeholder.example/sign-in

  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy app
      - run: pytest -q

  webhook:
    name: webhook
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webhook
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy handler.py
      - run: pytest -q

  terraform:
    name: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: fmt
        run: terraform fmt -check -recursive infra
      - name: validate each module
        run: |
          set -euo pipefail
          for d in infra/modules/*; do
            echo "── $d"
            (cd "$d" && terraform init -backend=false -input=false && terraform validate)
          done
